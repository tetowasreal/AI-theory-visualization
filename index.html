<script>
(function(){
  var LOCAL_JS = 'vendor/katex/katex.min.js';
  var LOCAL_AUTORENDER = 'vendor/katex/auto-render.min.js';
  var CDN_JS = 'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js';
  var CDN_AUTORENDER = 'https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js';

  function loadScript(src, onload, onerror){
    var s = document.createElement('script');
    s.src = src; s.onload = onload; s.onerror = onerror;
    document.head.appendChild(s);
  }
  function ready(){ window.dispatchEvent(new window.Event('katex-ready')); }
  function loadAutoRender(fromCdn){
    loadScript(fromCdn ? CDN_AUTORENDER : LOCAL_AUTORENDER, ready, function(){
      if(!fromCdn) loadScript(CDN_AUTORENDER, ready, ready); else ready();
    });
  }
  loadScript(LOCAL_JS, function(){ loadAutoRender(false); }, function(){
    loadScript(CDN_JS, function(){ loadAutoRender(true); }, ready);
  });
})();
</script>
<script src="app.js"></script>
